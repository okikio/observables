#
# One-time setup before this workflow can release or publish:
# - Link `okikio/observables` in the JSR package settings so `deno publish`
#   can exchange GitHub OIDC credentials for a short-lived publish token.
# - Configure npm trusted publishing for the `publish.yml` workflow so
#   `npm publish` can authenticate without a long-lived npm token.
#
# Release flow:
#   push to main or manual release-and-publish dispatch
#     -> semantic-release creates the GitHub Release
#     -> the published release event publishes the tagged commit to JSR and npm
#
# Publish-only flow:
#   published GitHub Release or manual publish-only dispatch
#     -> publish the specified release tag to JSR and npm
#     -> or retry only npm / only JSR after a partial publish failure
#
# A dedicated RELEASE_TOKEN is still required for semantic-release because the
# default GITHUB_TOKEN does not trigger downstream release events reliably.
name: Release and Publish

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      action:
        description: "Choose whether to create a release first or only publish an existing tag."
        required: true
        type: choice
        default: release-and-publish
        options:
          - release-and-publish
          - publish-only
      tag:
        description: "Existing tag to publish when action is publish-only."
        required: false
        type: string
      target:
        description: "Registry target for publish-only retries."
        required: true
        type: choice
        default: both
        options:
          - both
          - jsr
          - npm

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create GitHub release
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'release-and-publish')
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.detect.outputs.released }}
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: denoland/setup-deno@v2

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Configure git author
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Record release tags before semantic-release
        run: |
          git fetch --tags
          git tag -l 'v*' > /tmp/release-tags-before.txt

      - name: Install semantic-release
        run: |
          npm install --global \
            semantic-release \
            @semantic-release/changelog \
            @semantic-release/commit-analyzer \
            @semantic-release/exec \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/release-notes-generator

      - name: Create GitHub release
        run: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Detect whether a new release was created
        id: detect
        run: |
          git fetch --tags
          BEFORE_FILE=/tmp/release-tags-before.txt
          if [ ! -f "$BEFORE_FILE" ]; then
            touch "$BEFORE_FILE"
          fi

          NEW_TAG=$(comm -13 \
            <(sort -V "$BEFORE_FILE") \
            <(git tag -l 'v*' | sort -V) | tail -n 1)

          if [ -n "$NEW_TAG" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

  resolve-release:
    name: Resolve publish target
    runs-on: ubuntu-latest
    needs:
      - release
    if: always()
    outputs:
      should_publish: ${{ steps.resolve.outputs.should_publish }}
      ref: ${{ steps.resolve.outputs.ref }}
      tag: ${{ steps.resolve.outputs.tag }}
      publish_jsr: ${{ steps.resolve.outputs.publish_jsr }}
      publish_npm: ${{ steps.resolve.outputs.publish_npm }}
    steps:
      - name: Select the release tag to publish
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_ACTION: ${{ inputs.action }}
          DISPATCH_TAG: ${{ inputs.tag }}
          DISPATCH_TARGET: ${{ inputs.target }}
        run: |
          TAG=""
          TARGET="both"

          if [ "$EVENT_NAME" = "release" ]; then
            TAG="$RELEASE_TAG"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$DISPATCH_ACTION" = "publish-only" ]; then
            TAG="$DISPATCH_TAG"
            TARGET="$DISPATCH_TARGET"
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$DISPATCH_ACTION" = "publish-only" ] && [ -z "$TAG" ]; then
            echo "Publish-only dispatch requires a tag input." >&2
            exit 1
          fi

          if [ -z "$TAG" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "ref=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if [ "$TARGET" = "both" ] || [ "$TARGET" = "jsr" ]; then
            echo "publish_jsr=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_jsr=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$TARGET" = "both" ] || [ "$TARGET" = "npm" ]; then
            echo "publish_npm=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_npm=false" >> "$GITHUB_OUTPUT"
          fi

  publish-jsr:
    name: Publish to JSR
    needs:
      - resolve-release
    if: always() && needs.resolve-release.outputs.should_publish == 'true' && needs.resolve-release.outputs.publish_jsr == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-release.outputs.ref }}

      - uses: denoland/setup-deno@v2

      - name: Publish to JSR
        run: deno publish

  publish-npm:
    name: Publish to npm
    needs:
      - resolve-release
    if: always() && needs.resolve-release.outputs.should_publish == 'true' && needs.resolve-release.outputs.publish_npm == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-release.outputs.ref }}

      - uses: denoland/setup-deno@v2

      - name: Build npm package
        run: deno task build:npm

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        # npm trusted publishing uses the GitHub OIDC token minted from
        # `id-token: write`, so no NODE_AUTH_TOKEN secret is required here.
        run: |
          cd npm
          npm publish --provenance --access public
